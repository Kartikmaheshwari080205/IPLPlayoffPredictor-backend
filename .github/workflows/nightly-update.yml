name: Nightly Data Update

on:
  schedule:
    # Run 4 times a day during IPL season
    # Times in UTC (add 5:30 hours for IST)
    - cron: '30 2 * * *'   # 8:00 AM IST
    - cron: '30 8 * * *'   # 2:00 PM IST
    - cron: '30 12 * * *'  # 6:00 PM IST (before evening matches)
    - cron: '30 17 * * *'  # 11:00 PM IST (after evening matches)
  workflow_dispatch:  # Manual trigger button

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check for pending matches
        id: check_pending
        run: |
          if [ -d IPLPlayoffPredictor-backend ]; then
            cd IPLPlayoffPredictor-backend
          fi
          
          # Check if matches.txt exists and has pending matches
          if [ ! -f matches.txt ]; then
            echo "pending=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Count PENDING matches
          pending_count=$(grep -c "PENDING" matches.txt || echo 0)
          
          if [ "$pending_count" -gt 0 ]; then
            echo "pending=true" >> $GITHUB_OUTPUT
            echo "Found $pending_count pending matches"
          else
            echo "pending=false" >> $GITHUB_OUTPUT
            echo "No pending matches - skipping update"
          fi

      - name: Install Python dependencies
        if: steps.check_pending.outputs.pending == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: Build predictor for Linux runner
        if: steps.check_pending.outputs.pending == 'true'
        run: |
          if [ -d IPLPlayoffPredictor-backend ]; then
            cd IPLPlayoffPredictor-backend
          fi
          g++ -std=c++17 -O2 predictor.cpp -o predictor

      - name: Run nightly job
        if: steps.check_pending.outputs.pending == 'true'
        run: |
          if [ -d IPLPlayoffPredictor-backend ]; then
            cd IPLPlayoffPredictor-backend
          fi
          python nightly_job.py

      - name: Commit and push updated data
        if: steps.check_pending.outputs.pending == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d IPLPlayoffPredictor-backend ]; then
            cd IPLPlayoffPredictor-backend
          fi
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Update IPL data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git remote set-url origin https://github-actions[bot]:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push

